<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azort | Command Center</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="toast" class="toast">
        <i data-lucide="check-circle"></i> Product Key Copied!
    </div>

    <div class="app-container">
        
        <aside class="order-feed">
            <div class="feed-header">
                <h2><i data-lucide="shield"></i> Azort</h2>
                <div class="search-wrapper">
                    <i data-lucide="search"></i>
                    <input type="text" id="searchInput" placeholder="Search orders...">
                </div>
            </div>
            
            <div class="feed-list" id="feedList">
                <div class="loading-state">
                    <i data-lucide="loader" class="spinner"></i> Loading feed...
                </div>
                </div>
        </aside>

        <main class="detail-view" id="detailView">
            <div class="empty-state" id="emptyState">
                <i data-lucide="mouse-pointer-click"></i>
                <p>Select an order to view product details</p>
            </div>

            <div class="detail-content" id="detailContent" style="display: none;">
                <header class="detail-header">
                    <div>
                        <span class="badge success">Success</span>
                        <h1 id="view-order-id">#Order ID</h1>
                        <p class="timestamp" id="view-date">Date</p>
                    </div>
                </header>

                <div class="key-section">
                    <p class="section-label">Product Key (Click to Copy)</p>
                    <div class="key-display" id="view-key" onclick="copyKeyFromElement(this)">
                        XXXXX-XXXXX-XXXXX
                    </div>
                </div>

                <div class="specs-grid">
                    <div class="spec-card">
                        <i data-lucide="box"></i>
                        <p class="spec-label">Product</p>
                        <p class="spec-value" id="view-product">Name</p>
                    </div>
                    <div class="spec-card">
                        <i data-lucide="mail"></i>
                        <p class="spec-label">Customer Email</p>
                        <p class="spec-value" id="view-email">email@domain.com</p>
                    </div>
                    <div class="spec-card">
                        <i data-lucide="layers"></i>
                        <p class="spec-label">Quantity</p>
                        <p class="spec-value" id="view-qty">1</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

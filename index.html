<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azort | Delivery Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="toast" class="toast">
        <i data-lucide="check-circle"></i> Key copied to clipboard!
    </div>

    <div class="dashboard-container">
        <header>
            <div class="brand">
                <div class="brand-icon"><i data-lucide="shield"></i></div>
                <h1>Azort <span>Dashboard</span></h1>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" id="searchInput" placeholder="Search orders, products, or keys...">
                </div>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue"><i data-lucide="key"></i></div>
                <div class="stat-info">
                    <h3>Recent Keys</h3>
                    <p id="stat-total">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i data-lucide="check"></i></div>
                <div class="stat-info">
                    <h3>System Status</h3>
                    <p class="status-online">Online</p>
                </div>
            </div>
        </div>

        <main class="table-container">
            <div class="table-header">
                <h2>Delivery Logs</h2>
                <button class="refresh-btn" onclick="fetchKeys()">
                    <i data-lucide="refresh-cw" id="refreshIcon"></i> Refresh
                </button>
            </div>
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Date Generated</th>
                        <th>Order ID</th>
                        <th>Product</th>
                        <th>License Key</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="keyTable">
                    <tr id="loadingRow">
                        <td colspan="5" class="loading-state">
                            <i data-lucide="loader" class="spinner"></i> Fetching secure data...
                        </td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
